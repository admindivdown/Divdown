<script>
document.addEventListener('DOMContentLoaded', () => {
  const bBtn = document.getElementById('bahasaBtn');
  const bDropdown = document.getElementById('bahasaDropdown');

  if (bBtn && bDropdown) {
    bBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      bDropdown.classList.toggle('show-bahasa');
    });

    document.querySelectorAll('.bahasa-item').forEach(item => {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const pilihanLang = this.getAttribute('data-lang');
        
        if (pilihanLang && typeof gantiBahasa === 'function') {
          // Parameter 'true' ditambahkan di sini agar spinner muncul saat klik manual
          gantiBahasa(pilihanLang, true);
        }
        
        bDropdown.classList.remove('show-bahasa');
      });
    });

    document.addEventListener('click', (e) => {
      if (!bBtn.contains(e.target) && !bDropdown.contains(e.target)) {
        bDropdown.classList.remove('show-bahasa');
      }
    });
  }
});
</script>
